<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>go-pcap2socks - Панель управления</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 28px;
        }
        
        .status-badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .status-running {
            background: #d4edda;
            color: #155724;
        }
        
        .status-stopped {
            background: #f8d7da;
            color: #721c24;
        }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .device-list {
            list-style: none;
        }
        
        .device-item {
            padding: 15px;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }
        
        .device-item:hover {
            border-color: #667eea;
            background: #f8f9fa;
        }
        
        .device-info {
            flex: 1;
        }
        
        .device-ip {
            font-weight: bold;
            color: #333;
        }
        
        .device-mac {
            font-size: 12px;
            color: #666;
        }
        
        .device-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 10px;
        }
        
        .device-online {
            background: #28a745;
        }
        
        .device-offline {
            background: #dc3545;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background: #218838;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .traffic-chart {
            height: 200px;
            background: linear-gradient(180deg, rgba(102,126,234,0.1) 0%, rgba(102,126,234,0) 100%);
            border-bottom: 2px solid #667eea;
            position: relative;
            margin-top: 20px;
        }
        
        .chart-bar {
            position: absolute;
            bottom: 0;
            width: 20px;
            background: #667eea;
            border-radius: 5px 5px 0 0;
            transition: height 0.3s;
        }
        
        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .log-entry {
            margin-bottom: 5px;
        }
        
        .log-info { color: #4fc3f7; }
        .log-warn { color: #ffb74d; }
        .log-error { color: #e57373; }
        .log-success { color: #81c784; }
        
        .timestamp {
            color: #808080;
            margin-right: 10px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 go-pcap2socks</h1>
            <span id="statusBadge" class="status-badge status-stopped">Остановлено</span>
        </header>
        
        <div class="dashboard">
            <div class="card">
                <h2>📊 Статистика</h2>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="totalDevices">0</div>
                        <div class="stat-label">Устройств</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="activeDevices">0</div>
                        <div class="stat-label">Активных</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalTraffic">0 MB</div>
                        <div class="stat-label">Всего трафика</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="uptime">0:00</div>
                        <div class="stat-label">Время работы</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h2>🎮 Устройства</h2>
                <ul class="device-list" id="deviceList">
                    <li class="device-item">
                        <div class="device-info">
                            <div class="device-ip">Нет устройств</div>
                            <div class="device-mac">Подключите устройство</div>
                        </div>
                    </li>
                </ul>
            </div>
            
            <div class="card">
                <h2>⚙️ Управление</h2>
                <div class="controls">
                    <button class="btn-success" id="btnStart" onclick="startService()">▶ Запустить</button>
                    <button class="btn-danger" id="btnStop" onclick="stopService()">⏹ Остановить</button>
                    <button class="btn-primary" onclick="exportTraffic()">📥 Экспорт CSV</button>
                    <button class="btn-secondary" onclick="toggleProxy()">🔄 Прокси</button>
                </div>
                <div style="margin-top: 20px;">
                    <h3 style="font-size: 14px; margin-bottom: 10px;">Горячие клавиши:</h3>
                    <div style="font-size: 12px; color: #666;">
                        Ctrl+Alt+P - Вкл/Выкл прокси<br>
                        Ctrl+Alt+R - Перезапуск
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h2>📈 Трафик в реальном времени</h2>
            <div style="height: 250px;">
                <canvas id="trafficChartCtx"></canvas>
            </div>
        </div>
        
        <div class="card" style="margin-top: 20px;">
            <h2>📝 Логи</h2>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const API_BASE = '';
        let ws = null;
        let trafficChart = null;
        
        // Initialize WebSocket connection
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                addLog('WebSocket connected', 'success');
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleWSMessage(msg);
            };
            
            ws.onclose = () => {
                console.log('WebSocket disconnected, reconnecting...');
                addLog('WebSocket disconnected, reconnecting...', 'warn');
                setTimeout(initWebSocket, 3000);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
                addLog('WebSocket error', 'error');
            };
        }
        
        function handleWSMessage(msg) {
            switch (msg.type) {
                case 'status':
                    updateDashboard(msg.data);
                    break;
                case 'traffic':
                    updateTrafficDisplay(msg.data);
                    updateChart(msg.data);
                    break;
            }
        }
        
        // Initialize traffic chart with Chart.js
        function initTrafficChart() {
            const ctx = document.getElementById('trafficChartCtx');
            if (!ctx) return;
            
            trafficChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(30).fill(''),
                    datasets: [{
                        label: 'Upload',
                        data: Array(30).fill(0),
                        borderColor: '#dc3545',
                        backgroundColor: 'rgba(220, 53, 69, 0.1)',
                        fill: true,
                        tension: 0.4
                    }, {
                        label: 'Download',
                        data: Array(30).fill(0),
                        borderColor: '#28a745',
                        backgroundColor: 'rgba(40, 167, 69, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: (value) => formatBytes(value)
                            }
                        }
                    },
                    animation: {
                        duration: 500
                    }
                }
            });
        }
        
        function updateChart(traffic) {
            if (!trafficChart) return;
            
            // Add new data point
            const upload = traffic.upload_bytes || 0;
            const download = traffic.download_bytes || 0;
            
            trafficChart.data.datasets[0].data.push(upload);
            trafficChart.data.datasets[1].data.push(download);
            
            // Remove old data point
            if (trafficChart.data.datasets[0].data.length > 30) {
                trafficChart.data.datasets[0].data.shift();
                trafficChart.data.datasets[1].data.shift();
            }
            
            trafficChart.update('none');
        }
        
        function updateTrafficDisplay(traffic) {
            document.getElementById('totalTraffic').textContent = formatBytes(traffic.total_bytes || 0);
        }
        
        function updateDashboard(status) {
            // Update status badge
            const badge = document.getElementById('statusBadge');
            if (status.running) {
                badge.textContent = 'Запущено';
                badge.className = 'status-badge status-running';
            } else {
                badge.textContent = 'Остановлено';
                badge.className = 'status-badge status-stopped';
            }
            
            // Update statistics
            document.getElementById('totalDevices').textContent = status.devices?.length || 0;
            document.getElementById('activeDevices').textContent = status.devices?.filter(d => d.connected).length || 0;
            document.getElementById('totalTraffic').textContent = formatBytes(status.traffic?.total || 0);
            document.getElementById('uptime').textContent = status.uptime || '0:00';
            
            // Update device list
            updateDeviceList(status.devices || []);
        }
        
        function updateDeviceList(devices) {
            const list = document.getElementById('deviceList');
            
            if (devices.length === 0) {
                list.innerHTML = `
                    <li class="device-item">
                        <div class="device-info">
                            <div class="device-ip">Нет устройств</div>
                            <div class="device-mac">Подключите устройство</div>
                        </div>
                    </li>
                `;
                return;
            }
            
            list.innerHTML = devices.map(device => `
                <li class="device-item">
                    <div class="device-info">
                        <div class="device-ip">${device.ip || 'Unknown'}</div>
                        <div class="device-mac">${device.mac || 'Unknown'}</div>
                    </div>
                    <div class="device-status ${device.connected ? 'device-online' : 'device-offline'}"></div>
                </li>
            `).join('');
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        async function startService() {
            try {
                await fetch(`${API_BASE}/api/start`, { method: 'POST' });
                addLog('Service started', 'success');
                updateStatus();
            } catch (error) {
                addLog('Error starting service: ' + error, 'error');
            }
        }
        
        async function stopService() {
            try {
                await fetch(`${API_BASE}/api/stop`, { method: 'POST' });
                addLog('Service stopped', 'info');
                updateStatus();
            } catch (error) {
                addLog('Error stopping service: ' + error, 'error');
            }
        }
        
        async function toggleProxy() {
            try {
                await fetch(`${API_BASE}/api/hotkey/toggle`, { method: 'POST' });
                addLog('Proxy toggled', 'info');
            } catch (error) {
                addLog('Error toggling proxy: ' + error, 'error');
            }
        }
        
        async function exportTraffic() {
            try {
                window.open(`${API_BASE}/api/traffic/export`, '_blank');
                addLog('Traffic export started', 'success');
            } catch (error) {
                addLog('Error exporting traffic: ' + error, 'error');
            }
        }
        
        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
        }
        
        // Initialize traffic chart with dummy data
        function initTrafficChart() {
            const chart = document.getElementById('trafficChart');
            for (let i = 0; i < 30; i++) {
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.left = (i * 3.3) + '%';
                bar.style.height = Math.random() * 100 + '%';
                chart.appendChild(bar);
            }
        }
        
        // Update traffic chart
        function updateTrafficChart() {
            const bars = document.querySelectorAll('.chart-bar');
            bars.forEach(bar => {
                bar.style.height = Math.random() * 100 + '%';
            });
        }
        
        // Initial load
        initWebSocket();
        initTrafficChart();
        updateStatus();
        
        // Periodic updates (fallback if WebSocket fails)
        setInterval(updateStatus, 5000);
    </script>
</body>
</html>
