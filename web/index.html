<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>go-pcap2socks - Панель управления</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --success: #48bb78;
            --warning: #ed8936;
            --danger: #f56565;
            --light: #f7fafc;
            --dark: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s ease;
        }

        body.dark-theme {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        body.dark-theme header {
            background: rgba(30, 30, 50, 0.95);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        h1 {
            font-size: 24px;
            color: var(--dark);
            font-weight: 700;
        }

        body.dark-theme h1 {
            color: #e0e0e0;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
        }

        .btn-icon {
            width: 45px;
            height: 45px;
            padding: 0;
            border-radius: 12px;
            justify-content: center;
        }

        /* Status Badge */
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-running {
            background: rgba(72, 187, 120, 0.2);
            color: #2f855a;
            border: 2px solid #48bb78;
        }

        .status-stopped {
            background: rgba(245, 101, 101, 0.2);
            color: #c53030;
            border: 2px solid #f56565;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-running .status-dot {
            background: #48bb78;
        }

        .status-stopped .status-dot {
            background: #f56565;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        body.dark-theme .card {
            background: rgba(30, 30, 50, 0.95);
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        body.dark-theme .card h2 {
            color: #e0e0e0;
        }

        /* Stats Grid */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .stat-item {
            background: linear-gradient(135deg, #f7fafc, #edf2f7);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
        }

        body.dark-theme .stat-item {
            background: linear-gradient(135deg, #2d2d44, #3d3d5c);
        }

        .stat-item:hover {
            transform: scale(1.05);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        body.dark-theme .stat-label {
            color: #a0aec0;
        }

        /* Devices List */
        .devices-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .device-item {
            display: flex;
            align-items: center;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            background: #f7fafc;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
        }

        body.dark-theme .device-item {
            background: #2d2d44;
            border-left-color: var(--secondary);
        }

        .device-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .device-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .device-info {
            flex: 1;
            min-width: 0;
        }

        .device-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--dark);
            margin-bottom: 3px;
        }

        body.dark-theme .device-name {
            color: #e0e0e0;
        }

        .device-details {
            font-size: 13px;
            color: #718096;
        }

        body.dark-theme .device-details {
            color: #a0aec0;
        }

        .device-status {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }

        .device-online {
            background: rgba(72, 187, 120, 0.2);
            color: #2f855a;
        }

        .device-offline {
            background: rgba(245, 101, 101, 0.2);
            color: #c53030;
        }

        /* Logs */
        .log-container {
            background: #1a1a2e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 12px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-time {
            color: #667eea;
            margin-right: 10px;
        }

        .log-info { color: #48bb78; }
        .log-warn { color: #ed8936; }
        .log-error { color: #f56565; }

        /* Progress Bar */
        .progress-container {
            margin-top: 15px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: #718096;
        }

        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }

        body.dark-theme .progress-bar {
            background: #4a4a6a;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }

            .header-controls {
                flex-wrap: wrap;
                justify-content: center;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-sm {
            padding: 8px 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">🚀</div>
                <h1>go-pcap2socks</h1>
            </div>
            <div class="header-controls">
                <div id="statusBadge" class="status-badge status-stopped">
                    <span class="status-dot"></span>
                    <span id="statusText">Остановлен</span>
                </div>
                <button class="btn btn-icon" onclick="toggleTheme()" title="Тема">
                    🌓
                </button>
                <button class="btn btn-icon" onclick="refreshData()" title="Обновить">
                    🔄
                </button>
            </div>
        </header>

        <div class="dashboard">
            <!-- Status Card -->
            <div class="card">
                <h2>📊 Статус</h2>
                <div class="action-buttons">
                    <button class="btn btn-success" onclick="startService()">
                        ▶ Запустить
                    </button>
                    <button class="btn btn-danger" onclick="stopService()">
                        ⏹ Остановить
                    </button>
                </div>
                <div class="progress-container">
                    <div class="progress-label">
                        <span>Время работы</span>
                        <span id="uptime">00:00:00</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="uptimeBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Traffic Stats Card -->
            <div class="card">
                <h2>📈 Трафик</h2>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="uploadStat">0 B</div>
                        <div class="stat-label">⬆ Upload</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="downloadStat">0 B</div>
                        <div class="stat-label">⬇ Download</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalStat">0 B</div>
                        <div class="stat-label">Σ Всего</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="packetsStat">0</div>
                        <div class="stat-label">◈ Пакеты</div>
                    </div>
                </div>
            </div>

            <!-- Devices Card -->
            <div class="card">
                <h2>📱 Устройства</h2>
                <div class="stat-grid" style="margin-bottom: 15px;">
                    <div class="stat-item">
                        <div class="stat-value" id="activeDevices">0</div>
                        <div class="stat-label">Активные</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalDevices">0</div>
                        <div class="stat-label">Всего</div>
                    </div>
                </div>
                <div class="devices-list" id="devicesList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>Нет подключенных устройств</p>
                    </div>
                </div>
            </div>

            <!-- Logs Card -->
            <div class="card">
                <h2>📋 Логи</h2>
                <div class="log-container" id="logsContainer">
                    <div class="log-entry">
                        <span class="log-time">--:--:--</span>
                        <span class="log-info">Ожидание логов...</span>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-primary btn-sm" onclick="exportLogs()">
                        📥 Экспорт
                    </button>
                    <button class="btn btn-primary btn-sm" onclick="clearLogs()">
                        🗑 Очистить
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let isRunning = false;
        let startTime = null;
        let updateInterval = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTheme();
            refreshData();
            startAutoRefresh();
        });

        // Theme
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            localStorage.setItem('darkTheme', document.body.classList.contains('dark-theme'));
        }

        function loadTheme() {
            if (localStorage.getItem('darkTheme') === 'true') {
                document.body.classList.add('dark-theme');
            }
        }

        // Auto refresh
        function startAutoRefresh() {
            updateInterval = setInterval(refreshData, 3000);
        }

        async function refreshData() {
            try {
                await Promise.all([
                    fetchStatus(),
                    fetchTraffic(),
                    fetchDevices(),
                    fetchLogs()
                ]);
            } catch (error) {
                console.error('Refresh error:', error);
            }
        }

        // API calls
        async function fetchStatus() {
            const response = await fetch('/api/status');
            const data = await response.json();
            
            if (data.success) {
                isRunning = data.data.running;
                updateStatusUI(isRunning);
                
                if (isRunning && data.data.start_time) {
                    startTime = new Date(data.data.start_time);
                    updateUptime();
                }
            }
        }

        function updateStatusUI(running) {
            const badge = document.getElementById('statusBadge');
            const text = document.getElementById('statusText');
            
            if (running) {
                badge.className = 'status-badge status-running';
                text.textContent = 'Запущен';
            } else {
                badge.className = 'status-badge status-stopped';
                text.textContent = 'Остановлен';
                startTime = null;
                document.getElementById('uptime').textContent = '00:00:00';
                document.getElementById('uptimeBar').style.width = '0%';
            }
        }

        function updateUptime() {
            if (!startTime) return;
            
            const now = new Date();
            const diff = Math.floor((now - startTime) / 1000);
            
            const hours = Math.floor(diff / 3600);
            const minutes = Math.floor((diff % 3600) / 60);
            const seconds = diff % 60;
            
            const uptimeStr = [
                hours.toString().padStart(2, '0'),
                minutes.toString().padStart(2, '0'),
                seconds.toString().padStart(2, '0')
            ].join(':');
            
            document.getElementById('uptime').textContent = uptimeStr;
            
            // Progress bar (max 24 hours)
            const percentage = Math.min((diff / 86400) * 100, 100);
            document.getElementById('uptimeBar').style.width = percentage + '%';
        }

        async function fetchTraffic() {
            const response = await fetch('/api/traffic');
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('uploadStat').textContent = formatBytes(data.data.upload);
                document.getElementById('downloadStat').textContent = formatBytes(data.data.download);
                document.getElementById('totalStat').textContent = formatBytes(data.data.total);
                document.getElementById('packetsStat').textContent = data.data.packets.toLocaleString();
            }
        }

        async function fetchDevices() {
            const response = await fetch('/api/devices');
            const data = await response.json();
            
            if (data.success) {
                const devices = data.data.devices || [];
                document.getElementById('activeDevices').textContent = devices.filter(d => d.connected).length;
                document.getElementById('totalDevices').textContent = devices.length;
                
                renderDevices(devices);
            }
        }

        function renderDevices(devices) {
            const container = document.getElementById('devicesList');
            
            if (devices.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>Нет подключенных устройств</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = devices.map(device => `
                <div class="device-item">
                    <div class="device-icon">${getDeviceIcon(device.hostname)}</div>
                    <div class="device-info">
                        <div class="device-name">${escapeHtml(device.hostname || device.custom_name || 'Неизвестно')}</div>
                        <div class="device-details">${escapeHtml(device.ip)} • ${escapeHtml(device.mac)}</div>
                    </div>
                    <span class="device-status ${device.connected ? 'device-online' : 'device-offline'}">
                        ${device.connected ? '●' : '○'} ${device.connected ? 'В сети' : 'Офлайн'}
                    </span>
                </div>
            `).join('');
        }

        function getDeviceIcon(hostname) {
            if (!hostname) return '📱';
            const h = hostname.toLowerCase();
            if (h.includes('xbox')) return '🎮';
            if (h.includes('ps') || h.includes('playstation')) return '🎮';
            if (h.includes('switch')) return '🎮';
            if (h.includes('tv')) return '📺';
            if (h.includes('phone') || h.includes('mobile')) return '📱';
            if (h.includes('pc') || h.includes('desktop')) return '💻';
            if (h.includes('laptop')) return '💻';
            if (h.includes('tablet') || h.includes('ipad')) return '📱';
            return '📱';
        }

        async function fetchLogs() {
            const response = await fetch('/api/logs');
            const data = await response.json();
            
            if (data.success) {
                renderLogs(data.data.logs || []);
            }
        }

        function renderLogs(logs) {
            const container = document.getElementById('logsContainer');
            
            if (logs.length === 0) return;
            
            container.innerHTML = logs.slice(-50).reverse().map(log => `
                <div class="log-entry">
                    <span class="log-time">${log.time || '--:--:--'}</span>
                    <span class="log-${log.level || 'info'}">${escapeHtml(log.message || log)}</span>
                </div>
            `).join('');
        }

        // Actions
        async function startService() {
            await fetch('/api/start', { method: 'POST' });
            setTimeout(refreshData, 1000);
        }

        async function stopService() {
            await fetch('/api/stop', { method: 'POST' });
            setTimeout(refreshData, 1000);
        }

        function exportLogs() {
            alert('Экспорт логов...');
        }

        function clearLogs() {
            document.getElementById('logsContainer').innerHTML = `
                <div class="log-entry">
                    <span class="log-time">${new Date().toLocaleTimeString()}</span>
                    <span class="log-info">Логи очищены</span>
                </div>
            `;
        }

        // Utilities
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
