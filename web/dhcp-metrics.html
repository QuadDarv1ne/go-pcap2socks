<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHCP Metrics - go-pcap2socks</title>
    <style>
        :root {
            --bg-primary: #1e1e1e;
            --bg-secondary: #2d2d2d;
            --text-primary: #d4d4d4;
            --text-secondary: #808080;
            --accent: #0078d4;
            --success: #4caf50;
            --warning: #ff9800;
            --error: #f44336;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .metric-card {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent);
        }
        
        .metric-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .metric-unit {
            font-size: 14px;
            color: var(--text-secondary);
            margin-left: 5px;
        }
        
        .chart-container {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .log-container {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #404040;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-time {
            color: var(--text-secondary);
            margin-right: 10px;
        }
        
        .log-info { color: var(--accent); }
        .log-warn { color: var(--warning); }
        .log-error { color: var(--error); }
        
        .refresh-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        
        .refresh-btn:hover {
            background: #106ebe;
        }
        
        .error-message {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 DHCP Metrics Dashboard</h1>
            <div class="status">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">Connected</span>
                <button class="refresh-btn" onclick="fetchMetrics()">🔄 Refresh</button>
            </div>
        </header>
        
        <div id="errorContainer"></div>
        
        <div id="loading" class="loading">
            <p>Loading metrics...</p>
        </div>
        
        <div id="metricsContent" style="display: none;">
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Packets Received</div>
                    <div class="metric-value" id="packetsReceived">0</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-label">Packets Sent</div>
                    <div class="metric-value" id="packetsSent">0</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-label">DHCP Discover</div>
                    <div class="metric-value" id="discoverCount">0</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-label">DHCP Offer</div>
                    <div class="metric-value" id="offerCount">0</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-label">DHCP Request</div>
                    <div class="metric-value" id="requestCount">0</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-label">DHCP ACK</div>
                    <div class="metric-value" id="ackCount">0</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-label">Errors</div>
                    <div class="metric-value" id="errorsCount" style="color: var(--error);">0</div>
                </div>
                
                <div class="metric-card">
                    <div class="metric-label">Active Leases</div>
                    <div class="metric-value" id="activeLeases">0</div>
                </div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">📈 Traffic Overview</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <div style="color: var(--text-secondary); margin-bottom: 10px;">Success Rate</div>
                        <div style="font-size: 24px; font-weight: 600;" id="successRate">100%</div>
                        <div style="width: 100%; height: 8px; background: #404040; border-radius: 4px; margin-top: 10px;">
                            <div id="successBar" style="width: 100%; height: 100%; background: var(--success); border-radius: 4px; transition: width 0.3s;"></div>
                        </div>
                    </div>
                    <div>
                        <div style="color: var(--text-secondary); margin-bottom: 10px;">Total Sessions</div>
                        <div style="font-size: 24px; font-weight: 600;" id="totalSessions">0</div>
                    </div>
                </div>
            </div>
            
            <div class="chart-container">
                <div class="chart-title">📝 Recent Activity Log</div>
                <div class="log-container" id="activityLog">
                    <div class="log-entry">
                        <span class="log-time">--:--:--</span>
                        <span class="log-info">Waiting for DHCP activity...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let metricsHistory = [];
        let activityLogs = [];
        
        async function fetchMetrics() {
            try {
                const response = await fetch('/api/metrics/dhcp', {
                    headers: {
                        'Authorization': 'Bearer ' + (localStorage.getItem('apiToken') || '')
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        const token = prompt('API Token required:');
                        if (token) {
                            localStorage.setItem('apiToken', token);
                            fetchMetrics();
                        }
                        return;
                    }
                    throw new Error('Failed to fetch metrics');
                }
                
                const data = await response.json();
                
                if (data.ok && data.data && data.data.dhcp) {
                    updateMetrics(data.data.dhcp);
                    document.getElementById('errorContainer').innerHTML = '';
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('metricsContent').style.display = 'block';
                    document.getElementById('statusIndicator').style.background = 'var(--success)';
                    document.getElementById('statusText').textContent = 'Connected';
                } else {
                    showError(data.message || 'No metrics available');
                }
            } catch (error) {
                showError('Connection error: ' + error.message);
                document.getElementById('statusIndicator').style.background = 'var(--error)';
                document.getElementById('statusText').textContent = 'Disconnected';
            }
        }
        
        function updateMetrics(metrics) {
            // Update metric cards
            document.getElementById('packetsReceived').textContent = formatNumber(metrics.packets_received);
            document.getElementById('packetsSent').textContent = formatNumber(metrics.packets_sent);
            document.getElementById('discoverCount').textContent = formatNumber(metrics.discover_count);
            document.getElementById('offerCount').textContent = formatNumber(metrics.offer_count);
            document.getElementById('requestCount').textContent = formatNumber(metrics.request_count);
            document.getElementById('ackCount').textContent = formatNumber(metrics.ack_count);
            document.getElementById('errorsCount').textContent = formatNumber(metrics.errors_count);
            document.getElementById('activeLeases').textContent = formatNumber(metrics.active_leases);
            
            // Calculate success rate
            const total = metrics.packets_sent + metrics.errors_count;
            const successRate = total > 0 ? ((metrics.packets_sent / total) * 100).toFixed(1) : 100;
            document.getElementById('successRate').textContent = successRate + '%';
            document.getElementById('successBar').style.width = successRate + '%';
            
            // Update total sessions
            document.getElementById('totalSessions').textContent = formatNumber(metrics.discover_count);
            
            // Add to history for trend analysis
            metricsHistory.push({
                timestamp: new Date(),
                ...metrics
            });
            
            // Keep only last 100 data points
            if (metricsHistory.length > 100) {
                metricsHistory.shift();
            }
            
            // Update activity log
            updateActivityLog(metrics);
        }
        
        function updateActivityLog(metrics) {
            const lastMetrics = metricsHistory[metricsHistory.length - 2];
            if (!lastMetrics) return;
            
            const changes = [];
            
            if (metrics.discover_count > lastMetrics.discover_count) {
                const diff = metrics.discover_count - lastMetrics.discover_count;
                changes.push({ type: 'info', text: `+${diff} DHCP Discover received` });
            }
            
            if (metrics.offer_count > lastMetrics.offer_count) {
                const diff = metrics.offer_count - lastMetrics.offer_count;
                changes.push({ type: 'info', text: `+${diff} DHCP Offer sent` });
            }
            
            if (metrics.ack_count > lastMetrics.ack_count) {
                const diff = metrics.ack_count - lastMetrics.ack_count;
                changes.push({ type: 'success', text: `+${diff} DHCP ACK sent (leases assigned)` });
            }
            
            if (metrics.errors_count > lastMetrics.errors_count) {
                const diff = metrics.errors_count - lastMetrics.errors_count;
                changes.push({ type: 'error', text: `+${diff} Errors occurred` });
            }
            
            if (changes.length > 0) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString();
                
                changes.forEach(change => {
                    activityLogs.unshift({
                        time: timeStr,
                        type: change.type,
                        text: change.text
                    });
                });
                
                // Keep only last 50 logs
                if (activityLogs.length > 50) {
                    activityLogs = activityLogs.slice(0, 50);
                }
                
                renderActivityLog();
            }
        }
        
        function renderActivityLog() {
            const container = document.getElementById('activityLog');
            container.innerHTML = activityLogs.map(log => `
                <div class="log-entry">
                    <span class="log-time">${log.time}</span>
                    <span class="log-${log.type}">${log.text}</span>
                </div>
            `).join('');
        }
        
        function formatNumber(num) {
            if (num >= 1000000) {
                return (num / 1000000).toFixed(1) + 'M';
            } else if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'K';
            }
            return num.toString();
        }
        
        function showError(message) {
            document.getElementById('errorContainer').innerHTML = `
                <div class="error-message">
                    ⚠️ ${message}
                </div>
            `;
            document.getElementById('loading').style.display = 'none';
        }
        
        // Auto-refresh every 5 seconds
        setInterval(fetchMetrics, 5000);
        
        // Initial fetch
        fetchMetrics();
    </script>
</body>
</html>
